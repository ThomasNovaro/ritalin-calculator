<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g transform="rotate(45 50 50)">
    <!-- Mask to clip the red top half to the pill's rounded corners -->
    <clipPath id="pill-mask">
      <rect x="25" y="15" width="50" height="70" rx="25"/>
    </clipPath>
    
    <!-- White Bottom Half -->
    <rect x="25" y="15" width="50" height="70" rx="25" fill="#FAFAFA" />
    
    <!-- Red Top Half -->
    <rect x="25" y="15" width="50" height="35" fill="#F87171" clip-path="url(#pill-mask)" />
    
    <!-- Outer Pill Border -->
    <rect x="25" y="15" width="50" height="70" rx="25" fill="none" stroke="#18181B" stroke-width="8" />

    <!-- Center Line -->
    <line x1="25" y1="50" x2="75" y2="50" stroke="#18181B" stroke-width="8" />

    <!-- Middle Button -->
    <circle cx="50" cy="50" r="12" fill="#FAFAFA" stroke="#18181B" stroke-width="8"/>
    <circle cx="50" cy="50" r="4" fill="#18181B"/>
  </g>
</svg>